<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login · Lil Cart 💜</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'Poppins', sans-serif;
    background: #f0edff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.card {
    background: white;
    border-radius: 20px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 40px rgba(99,83,200,0.10);
}
h2 { color: #4b3f72; margin-bottom: 8px; font-size: 26px; }
.sub { color: #9b8fc7; font-size: 14px; margin-bottom: 32px; }
label { font-size: 13px; color: #7a6fa3; display: block; margin-bottom: 6px; }
input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid #e2dbff;
    border-radius: 10px;
    font-size: 15px;
    font-family: 'Poppins', sans-serif;
    outline: none;
    transition: border 0.2s;
    margin-bottom: 20px;
    color: #4b3f72;
}
input:focus { border-color: #a393eb; }
.btn {
    width: 100%;
    padding: 14px;
    background: #a393eb;
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 500;
    font-family: 'Poppins', sans-serif;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
}
.btn:hover { background: #8b7cd6; transform: scale(1.02); }
.footer { text-align: center; margin-top: 20px; font-size: 13px; color: #9b8fc7; }
.footer a { color: #7c6fca; text-decoration: none; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
    <h2>Welcome back 💜</h2>
    <p class="sub">Log in to your Lil Cart account</p>

    <form method="POST">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@email.com" required>

        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit" class="btn">Log in</button>
    </form>

    <div class="footer">
        Don't have an account? <a href="/signup">Sign up</a>
    </div>
</div>
</body>
</html>
