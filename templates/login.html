<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Lil Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(160deg, #fff5ea, #ffe0cc 55%, #ffd6cf);
}
.card {
    width: min(100%, 430px);
    background: rgba(255,255,255,0.95);
    border-radius: 28px;
    padding: 34px;
    box-shadow: 0 20px 60px rgba(115, 57, 43, 0.15);
}
h1 { margin: 0 0 8px; color: #7a3d2f; }
p { color: #775951; line-height: 1.6; }
.flash {
    background: #fff3db;
    border: 1px solid #f2d08e;
    border-radius: 16px;
    padding: 12px 14px;
    margin: 14px 0;
}
label {
    display: block;
    margin: 16px 0 8px;
    font-size: 14px;
    font-weight: 600;
    color: #5b3027;
}
input {
    width: 100%;
    padding: 13px 14px;
    border-radius: 16px;
    border: 1px solid #e3c4b1;
    font: inherit;
}
button {
    width: 100%;
    margin-top: 22px;
    padding: 14px;
    border: 0;
    border-radius: 18px;
    font: inherit;
    font-weight: 600;
    color: white;
    background: #ef7965;
    cursor: pointer;
}
.secondary {
    margin-top: 12px;
    background: #fff6f1;
    color: #8b4c3f;
    border: 1px solid #e6c0b3;
}
a { color: #a54837; }
</style>
</head>
<body>
<div class="card">
    <h1>Welcome back</h1>
    <p>Log in to manage your listings or browse local handmade products.</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" value="{{ email }}" required>

        <label for="password">Password</label>
        <input id="password" type="password" name="password" required>

        <button type="submit">Log in</button>
    </form>

    {% if show_resend %}
        <form method="POST" action="/resend-verification">
            <input type="hidden" name="email" value="{{ email }}">
            <button class="secondary" type="submit">Resend verification email</button>
        </form>
    {% endif %}

    <p style="margin-top:18px;">Need an account? <a href="/signup">Sign up</a></p>
</div>
</body>
</html>
