<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seller Dashboard | Lil Cart</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
<style>
body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(160deg, #fff7ef, #ffd9c6 60%, #ffc6b9);
}
.card {
    width: min(100%, 520px);
    background: rgba(255,255,255,0.94);
    border-radius: 28px;
    padding: 32px;
    box-shadow: 0 22px 60px rgba(115, 57, 43, 0.15);
}
a { color: #a54837; }
</style>
</head>
<body>
<div class="card">
    <h1>Seller Dashboard moved</h1>
    <p>The seller workflow now lives inside your main account dashboard so profile updates, pricing notes, and product posting stay in one place.</p>
    <p><a href="/account">Open dashboard</a></p>
</div>
</body>
</html>
