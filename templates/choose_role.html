<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Role | Lil Cart</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(150deg, #fff7ef, #ffd9c6 60%, #ffc6b9);
}
.card {
    width: min(100%, 700px);
    background: rgba(255,255,255,0.94);
    border-radius: 30px;
    padding: 34px;
    box-shadow: 0 22px 60px rgba(115, 57, 43, 0.15);
}
h1 { margin-top: 0; color: #7a3d2f; }
.grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
}
.tile {
    padding: 22px;
    border-radius: 24px;
    background: #fff8f4;
    border: 1px solid #eccbbd;
}
.tile a {
    display: inline-block;
    margin-top: 16px;
    text-decoration: none;
    padding: 12px 18px;
    border-radius: 16px;
    font-weight: 600;
    background: #ef7965;
    color: white;
}
@media (max-width: 720px) {
    .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="card">
    <h1>How do you want to use Lil Cart?</h1>
    <div class="grid">
        <div class="tile">
            <h2>Buyer</h2>
            <p>Browse homemade products and discover new small sellers in one place.</p>
            <a href="/set-role/buyer">Continue as buyer</a>
        </div>
        <div class="tile">
            <h2>Seller</h2>
            <p>List your products, manage your profile, and track when you move from free to paid posts.</p>
            <a href="/set-role/seller">Continue as seller</a>
        </div>
    </div>
</div>
</body>
</html>
